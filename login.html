<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NMen - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Work+Sans:wght@300;400;500&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#e2e2e2",
              "secondary-fixed-dim": "#acabab",
              "primary": "#000000",
              "surface-tint": "#5e5e5e",
              "surface-dim": "#dadada",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "on-surface-variant": "#474747",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#3b3b3b",
              "surface-variant": "#e2e2e2",
              "on-secondary-fixed": "#1b1c1c",
              "on-primary-container": "#ffffff",
              "surface-container-highest": "#e2e2e2",
              "background": "#f9f9f9",
              "secondary": "#5e5e5e",
              "secondary-fixed": "#c7c6c6",
              "on-tertiary-fixed": "#ffffff",
              "primary-fixed": "#5e5e5e",
              "on-secondary": "#ffffff",
              "surface-bright": "#f9f9f9",
              "outline": "#777777",
              "tertiary-container": "#747474",
              "secondary-container": "#d5d4d4",
              "primary-fixed-dim": "#474747",
              "outline-variant": "#c6c6c6",
              "surface-container-low": "#f3f3f3",
              "on-error": "#ffffff",
              "surface-container-high": "#e8e8e8",
              "surface-container": "#eeeeee",
              "tertiary-fixed": "#5e5e5e",
              "on-tertiary-container": "#ffffff",
              "on-secondary-container": "#1b1c1c",
              "tertiary": "#3b3b3b",
              "on-primary-fixed": "#ffffff",
              "on-primary": "#e2e2e2",
              "tertiary-fixed-dim": "#474747",
              "on-background": "#1a1c1c",
              "inverse-on-surface": "#f1f1f1",
              "on-tertiary": "#e2e2e2",
              "on-error-container": "#410002",
              "surface": "#f9f9f9",
              "on-surface": "#1a1c1c",
              "error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#3b3b3c",
              "inverse-surface": "#2f3131",
              "error": "#ba1a1a",
              "inverse-primary": "#c6c6c6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Work Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-6">
<div class="w-full max-w-md">
<!-- Brand Identity -->
<div class="mb-12 text-center">
<h1 class="font-headline text-4xl font-black tracking-tighter uppercase text-primary">NMen</h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-secondary mt-2">The Digital Monolith</p>
</div>
<!-- Auth Card -->
<div class="bg-surface-container-lowest p-10 md:p-12 shadow-[48px_48px_80px_rgba(26,28,28,0.04)]">
<div class="mb-10">
<h2 class="font-headline text-2xl font-bold tracking-tight text-primary">Login</h2>
<p class="font-body text-sm text-secondary mt-1">Enter your credentials to access your profile.</p>
</div>
<form class="space-y-8">
<!-- Email Field -->
<div class="group">
<label class="font-label text-[10px] uppercase tracking-widest text-secondary block mb-2 transition-colors group-focus-within:text-primary" for="email">Email Address</label>
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary font-body text-base transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
<!-- Password Field -->
<div class="group">
<div class="flex justify-between items-center mb-2">
<label class="font-label text-[10px] uppercase tracking-widest text-secondary transition-colors group-focus-within:text-primary" for="password">Password</label>
<a class="font-label text-[10px] uppercase tracking-widest text-outline hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full bg-transparent border-0 border-b border-outline-variant py-3 px-0 focus:ring-0 focus:border-primary font-body text-base transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center space-x-3">
<input class="w-4 h-4 border-outline-variant rounded-none text-primary focus:ring-offset-0 focus:ring-0 cursor-pointer" id="remember" name="remember" type="checkbox"/>
<label class="font-label text-xs text-secondary cursor-pointer hover:text-primary transition-colors" for="remember">Remember my session</label>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full bg-primary text-on-primary py-5 font-label text-xs font-bold uppercase tracking-widest hover:bg-primary-container transition-all active:scale-[0.98]" type="submit">
                        Login to Account
                    </button>
</div>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-surface-container"></div>
<span class="flex-shrink mx-4 font-label text-[10px] uppercase tracking-widest text-outline-variant">OR CONTINUE WITH</span>
<div class="flex-grow border-t border-surface-container"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center space-x-2 py-4 border border-outline-variant/30 hover:bg-surface-container-low transition-colors font-label text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined text-lg" data-icon="google">google</span>
<span>Google</span>
</button>
<button class="flex items-center justify-center space-x-2 py-4 border border-outline-variant/30 hover:bg-surface-container-low transition-colors font-label text-[10px] uppercase tracking-widest">
<span class="material-symbols-outlined text-lg" data-icon="facebook">social_leaderboard</span>
<span>Facebook</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body text-sm text-secondary">
                New to NMen? 
                <a class="font-bold text-primary underline underline-offset-4 decoration-1 hover:decoration-2 transition-all ml-1" href="#">Create an Account</a>
</p>
</div>
</div>
<!-- Decorative Image Layer (Ambient) -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden opacity-20">
<div class="absolute -top-24 -right-24 w-96 h-96 bg-surface-container-high rounded-full blur-[120px]"></div>
<div class="absolute -bottom-24 -left-24 w-96 h-96 bg-surface-variant rounded-full blur-[120px]"></div>
</div>
</body></html>
