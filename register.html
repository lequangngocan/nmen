<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NMen | Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;700;800&amp;family=Work+Sans:wght@300;400;600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-primary-fixed-variant": "#e2e2e2",
              "secondary-fixed-dim": "#acabab",
              "primary": "#000000",
              "surface-tint": "#5e5e5e",
              "surface-dim": "#dadada",
              "on-tertiary-fixed-variant": "#e2e2e2",
              "on-surface-variant": "#474747",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#3b3b3b",
              "surface-variant": "#e2e2e2",
              "on-secondary-fixed": "#1b1c1c",
              "on-primary-container": "#ffffff",
              "surface-container-highest": "#e2e2e2",
              "background": "#f9f9f9",
              "secondary": "#5e5e5e",
              "secondary-fixed": "#c7c6c6",
              "on-tertiary-fixed": "#ffffff",
              "primary-fixed": "#5e5e5e",
              "on-secondary": "#ffffff",
              "surface-bright": "#f9f9f9",
              "outline": "#777777",
              "tertiary-container": "#747474",
              "secondary-container": "#d5d4d4",
              "primary-fixed-dim": "#474747",
              "outline-variant": "#c6c6c6",
              "surface-container-low": "#f3f3f3",
              "on-error": "#ffffff",
              "surface-container-high": "#e8e8e8",
              "surface-container": "#eeeeee",
              "tertiary-fixed": "#5e5e5e",
              "on-tertiary-container": "#ffffff",
              "on-secondary-container": "#1b1c1c",
              "tertiary": "#3b3b3b",
              "on-primary-fixed": "#ffffff",
              "on-primary": "#e2e2e2",
              "tertiary-fixed-dim": "#474747",
              "on-background": "#1a1c1c",
              "inverse-on-surface": "#f1f1f1",
              "on-tertiary": "#e2e2e2",
              "on-error-container": "#410002",
              "surface": "#f9f9f9",
              "on-surface": "#1a1c1c",
              "error-container": "#ffdad6",
              "on-secondary-fixed-variant": "#3b3b3c",
              "inverse-surface": "#2f3131",
              "error": "#ba1a1a",
              "inverse-primary": "#c6c6c6"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Work Sans"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Work Sans', sans-serif;
            background-color: #f9f9f9;
        }
        input:focus {
            outline: none;
            border-bottom-color: #000000 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body class="bg-surface text-on-surface flex min-h-screen">
<!-- Left Content Column (Visual Editorial Side) -->
<div class="hidden lg:flex lg:w-1/2 relative bg-surface-container overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Brand Aesthetic" class="w-full h-full object-cover grayscale brightness-90" data-alt="Monochrome cinematic portrait of a well-dressed man in a structured minimalist coat standing in an architectural concrete setting with harsh dramatic shadows." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC_chha0-f4q8hnzX_LGwQemLaKUnRVpR7h950k8YjGUzLVOhaV-8SJsX5ntJkKXNuLxQtL4b7ceDcvcsBjovcjabB1_zEyNfuLP-aTrwP1qGpu5qin4WDspcXF1c5G8rSsFlFVEpiSCvMSxacdeiR1i0Ifv2vEqKKdmWJFjMCIbOQahkLE2TwrpQeqvLQYgpbjIw-c6Kvj0_wfm_uAH3CNjqkVWlRNbJuSlInkB5poTpDSrW6pNpn5KmwUVQSq60L0lGcG1j9QDA"/>
</div>
<div class="relative z-10 p-16 flex flex-col justify-between h-full w-full bg-gradient-to-t from-black/40 to-transparent">
<div>
<h1 class="font-headline font-black text-6xl tracking-tighter text-white uppercase leading-none">
                    NMen
                </h1>
</div>
<div class="max-w-md">
<p class="font-headline text-white text-3xl font-light tracking-tight leading-snug">
                    Architectural precision for the modern masculine wardrobe.
                </p>
<div class="mt-8 w-12 h-0.5 bg-white"></div>
</div>
</div>
</div>
<!-- Right Content Column (Form Side) -->
<div class="w-full lg:w-1/2 flex flex-col justify-center items-center px-6 md:px-12 py-20 bg-surface">
<div class="w-full max-w-md">
<!-- Mobile Header Logo -->
<div class="lg:hidden mb-12">
<span class="font-headline font-black text-3xl tracking-tighter text-primary uppercase">NMen</span>
</div>
<div class="mb-12">
<h2 class="font-headline font-extrabold text-4xl tracking-tighter text-primary uppercase mb-2">Create Account</h2>
<p class="font-body text-secondary text-sm tracking-wide">Enter your details to join the NMen collective.</p>
</div>
<form action="#" class="space-y-8">
<!-- Full Name Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="full_name">Full Name</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-0 font-body text-primary placeholder-stone-300 focus:border-primary transition-all" id="full_name" name="full_name" required="" type="text"/>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="email">Email Address</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-0 font-body text-primary placeholder-stone-300 focus:border-primary transition-all" id="email" name="email" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<div class="relative">
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-0 font-body text-primary placeholder-stone-300 focus:border-primary transition-all" id="password" name="password" required="" type="password"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-outline cursor-pointer hover:text-primary">visibility</span>
</div>
</div>
<!-- Confirm Password Field -->
<div class="flex flex-col gap-2">
<label class="font-label text-xs font-semibold uppercase tracking-widest text-on-surface-variant" for="confirm_password">Confirm Password</label>
<input class="w-full bg-transparent border-t-0 border-x-0 border-b border-outline-variant py-3 px-0 font-body text-primary placeholder-stone-300 focus:border-primary transition-all" id="confirm_password" name="confirm_password" required="" type="password"/>
</div>
<!-- CTA Actions -->
<div class="pt-6 space-y-6">
<button class="w-full py-5 bg-primary text-on-primary font-headline font-bold text-sm uppercase tracking-[0.2em] hover:bg-primary-container active:scale-[0.98] transition-all duration-300" type="submit">
                        Create Account
                    </button>
<div class="flex items-center gap-4 text-outline-variant">
<div class="flex-grow h-px bg-current"></div>
<span class="font-label text-[10px] uppercase tracking-widest">or</span>
<div class="flex-grow h-px bg-current"></div>
</div>
<div class="flex justify-center">
<p class="font-body text-sm text-secondary">
                            Already have an account? 
                            <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 transition-all" href="#">Login</a>
</p>
</div>
</div>
</form>
<!-- Legal Footer -->
<div class="mt-20">
<p class="font-body text-[10px] text-stone-400 leading-relaxed uppercase tracking-widest">
                    By creating an account, you agree to the NMen <span class="text-secondary cursor-pointer hover:text-primary underline">Terms of Service</span> and <span class="text-secondary cursor-pointer hover:text-primary underline">Privacy Policy</span>.
                </p>
</div>
</div>
</div>
</body></html>
